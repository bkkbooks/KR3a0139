body:
  text: 少子問律自序吾文章之體多世人所驚汝可師耳以心不可使耳為心師也夫文豈有常體但以有體為常政當使常有其體丈夫當刪詩書制禮樂何至因循寄人籬下且中代之文道體關變尺寸相資彌縫舊物吾之文章體亦何異何嘗顛溫涼而錯寒暑綜哀樂而橫歌哭哉政以屬辭多出比事不羈不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦已極其所矣汝若復別得體者吾不拘也吾義亦如文造次乘我顛沛非物吾無師無友不文不句頗有孤神獨逸耳義之為用將使性入清波塵洗猶沐無得釣聲同利舉價如高俾是道場險成軍路吾昔嗜僧言多肆法辨此盡遊乎言笑而汝等無幸又云人生之口正可論道說義惟飲與食如樹網焉吾每以不爾為恨爾曹當振綱也南齊書張融傳門論吾門世供佛舅氏奉道道也與佛逗極無二寂然不動致本則同感而遂通達跡成異其猶樂之不沿不隔五帝之祕禮之不襲三皇之聖豈三與此皆殊時故不同其風異世故不一其義安可輒駕庸愚誣誷神極吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積遠難亮越人以為鳧楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻跡既分吾已翔其所集汝可專遵於佛跡而無侮於道本書於二何兩孔周剡山茨釋僧祐宏明集南齊書顧歡傳引張融門律云道之與佛逗極無二吾見道士與道人至鴻常一耳少子致書諸遊生者曰張融白鳥哀鳴於將死人善言於就暮頃既病盛生衰此亦魂留幾氣況驚舟失柁於空壑山足無絆於澤中故視陰之間雖寸每遽不縫不徙也欲使魄後餘意繩墨弟姪故為門律數感其一章通源二道今奏諸賢以為何若宏明集周剡山茨歸書少子曰周顒頓首懋製來班承復峻其門則參子無踞誠不待獎敬尋同本有測高心雖神道所歸吾知其主然自釋之外儒綱為宏過此而能與仲尼相若者黃老實雄也其教流漸非無邪弊素朴之本義有可崇吾取捨舊懷粗有沍渭與奪之際不至朱紫但蓄積懷抱未暇厝言耳途軌乖順不可謬同異之聞文宜有歸辨來旨謂致本則同似非吾所謂同時殊風異又非吾所謂異也久欲此中微舉條裁幸因雅趣試其極言且略如左遲聞深況通源曰道也與佛逗極無二寂然不動致本則同感而遂通達跡誠異周之問曰論云致本則同請問何義是其所謂本乎言道家者豈不以二篇為主言佛教者亦應以般若為宗二篇所貴義極虛無般若所觀照窮法性虛無法性其寂雖同住寂之方其旨則別論所謂逗極無二者為逗極極於虛無當無二於法性邪將二塗之外更有異本儻虛無法性其趣不殊乎若有異本思告異本之情如其不殊願聞不殊之說通源曰殊時故不同其風異世故不一其義吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天道積遠難亮越人以為鳧楚人以為乙人自楚越耳鴻常一鴻乎夫澄本雖一吾自俱宗其本鴻跡既分吾已翔其所集周之問曰論云時殊故不同其風是佛教之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳧則乙唯足下所宗之本一物為鴻耳驅馳佛道無免二乖南齊書引作末未知高鑒緣何識本輕而宗之其有旨乎若猶取二教以位其本恐戰獄方興未能聽訟也若雖因二教同測教源者則此教之源每沿教而見矣自應鹿巾環杖悠然目擊儒墨誾誾從來何諍苟合源共是分跡雙非則二跡之用宜均去取奚為翔集所向勤務惟佛專氣抱一無謹於道乎言精旨遠企聞後要同上南齊書顧歡傳引周顒難曰虛無法性其寂雖同位寂之方其旨則別論所謂逗極無二者為逗極於虛無當無二於法性耶足下所宗之本至其有旨乎通源曰汝可專遵於佛跡而無侮於道本周之問曰足下專遵佛跡而無侮道本吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異邪既欲精探彼我方相究涉理類所關不得無請宏明集答周顒書張融曰吾未能忘身故有情身分外既化極魂首復為子弟留地不欲使方寸舊都日夜荒沒平生所困橫馗而草所以製是門律以律其門非佛與道門將何律故告氣緩命憑魄申陰數感十應通源定本實欲足下發豫奇意果能翔續起情妙見正析既赴所志今為子言周之問曰論云致本則同請問何義是其所謂本乎答彼周曰夫性靈之為性能知者也道德之為道可知者也能知而不知所可知非能知之義可知而不為能知所知非夫可知矣故知能知必赴於道可知必知所赴而下士雷情波照鼓欲神精明驅動識用沈藹所以倒心下灌昭隔於道至若伯陽專氣致柔停虛任魄載營抱一居凝通靜唯通也則照無所沒魄緒停虛故融然自道足下欲使伯陽不靜寧可而得乎使靜而不怕道亦于何而可得今既靜而兩神神靜而道二吾未之前聞也故逗極所以一為性遊簡且韻猖狂曠不能復行次戰思定霸宇內但敷生靈以竦志庶足下罔象以捫珠是以則帝屬五而神常一皇有三而道無二鳧乙之交定者鴻乎吾所以直其繩矣周之問曰言道家者豈不以二篇為主言佛教者亦應以般若為宗二篇所貴義極虛無般若所觀照窮法性虛無法性其寂雖同住寂之方其旨則別答彼周曰法性雖以即色圖空虛無誠乃有外張義然環會其所中足下當加以半思也至夫遊無蕩思心塵自拂思以無蕩一舉形上是雖忘有老如騫釋然而有忘釋不伐老當其神地悠悠精和坐廢寂然以湛其神遂通以沖其用登其此地吾不見釋家之與老氏陟其此意吾孰識老氏之與釋家逗極之所以無二親情故妙得其一矣直以物感既分應物難合令萬象與視聽交錯視聽與萬象相橫著之既已深郤之必方淺所以苦下之翁且藏即色順其所有不震其情尊其所無漸情其順及物有潛去人時欲無既可西風晝舉而致南精夕夢漢魂中寐不其可乎若卿謂老氏不盡乎無則非期於得意若卿謂盡無而不盡有得意復爽吾所期卿若疑老氏盡有而不亮以教則釋家有盡何以峻跡斯時卿若以釋家時宜跡峻其猶老氏時峻此跡逗極之同茲焉余意周之問曰論云時殊故不同其風是佛教之異於道也世異故不一其義是道言之乖於佛也道佛兩殊非鳧則乙答彼周曰非鳧則乙跡固然矣跡固其然吾不復答但得其世異時殊不宜異其所以之異周之問曰未知高鑒緣何識本答彼周曰綜識施本已吐前牘吾與老釋相識正如此正復是目擊道斯存卿欲必曲鞠其辭吾不知更所以自訟周之問曰若猶取二教以位其本恐戰獄方興未能聽訟也答彼周曰得意有本何至取教周之問曰若雖因二教同測教源者則此教之源每沿教而見矣答彼周曰誠哉有是言吾所以見道未一於佛但吾之即此言別有奇即耳周之問曰自應鹿巾環杖悠然自擊儒墨誾誾從來何諍答彼周曰虞芮二國之鬭田非文王所知也碎白玉以泯鬭其別有尊者乎況夜戰一鴻妄巾鳧乙斯自鹿巾之空負頭上環杖之自誣掌中吾安得了之哉周之問曰苟合源共是分跡雙非則二跡之用宜均去取奚為翔集所向勤務唯佛專氣抱一無謹於道乎答彼周曰應感多端神情數廣吾不翔翮於四果卿尚無疑其集佛吾不翔翮於五通而於集道復何晦且寶聖宜太跡匪情急矧吾已有所集方復移其翔者邪卿得其無二於兩楹故不峻督其去取周之問曰吾則心持釋訓業愛儒言未知足下雅意佛儒安在為當本一末殊為本末俱異邪答彼周曰吾乃自元混百聖同投一極而近論通源儒不在議足下今極其儒當欲列儒圍道故無屬垣耳隙思潛師夜以遂圖掩天城恐難升之險非子所躋則吾見師之出不見其入也吾已謂百聖同所投何容本末俱其異更以瀝勢倒兵恣卿智勇吾之勇者自縱橫湊出周顒重答書周顒頓首夫可以運寄情抱非理何師中外聲訓登塗所奉而使此中介分然去留無薄是則怏怏失路在我奚難足下善欲言之吾亦言之未已也輒復往研遲承來析通源曰法性雖以即色圖空虛無誠乃有外張義所以苦下之翁且藏即色順其所有不震其情尊其所無漸情其順周之問曰苦下之藏即色信矣斯言也更恐有不及於即色容自託以能藏則能藏者廣或不獨出於厲鄉耳夫有之為有物知其有無之為無人識其無老氏之署有題無無出斯域是吾三宗鄙論所謂取捨驅馳夫有能越其度者也佛教所以義奪情靈言詭聲律蓋謂即色非有故擅絶於群家耳此塗未明在老何續但紛紛橫沸皆由著有之家因俗茲焉是患既患由有滯而有性未明矯有之家因崇無術有性不明雖則巨蔽然違誰尚靜涉纍實微是道家之所以有埤宏教前白所謂黃老實雄者也正何舊說皆云老不及聖若如斯論不得影響於釋宗矣吾之位老不至乃然大夫士應世其體無方或為儒林之宗或為國師道士斯經教之成說也乃至宰官長者咸託身相何為老生獨非一跡但未知涉觀淺深品位高下耳此皆大明未啓權接一方日月出矣爝火宜廢無餘既說衆權自寢足下猶欲抗遺燎於日月之下明此火與日月通源既情崇於日月又無侮於火本末知此火本者將為名乎將或實哉名而已邪道本安在若言欲實之日月為實矣斯則事盡於一佛不知其道也通源之旨源與誰通通源曰當其神地悠悠精和坐廢登其此地吾不見釋家之與老氏陟其此意吾孰釋老氏之與釋家又曰今既靜而兩神神靜而道二吾未之前聞也又曰伯陽專氣致柔停虛任魄魄緒停虛故融然自道也又曰心塵自拂一舉形上周之問曰足下法性雖以即色圖空虛無誠乃有外張義竊謂老釋重出對分區野其所境域無過斯言然則老氏之神地悠悠自悠悠於有外釋家之精和坐廢每坐廢於色空登老氏之地則老異於釋涉釋氏之意則釋氏殊於老神既靜而不兩靜既兩而道二足下未之前聞吾則前聞之矣苟然則魄緒停虛是自虛其所謂虛融然自道亦非吾所聞道若夫心塵自拂一舉形上皆或未涉於大方不敢以通源相和也通源曰足下欲使伯陽不靜寧可而得乎使靜而不怕道亦于何而不得周之問曰甚如來言吾亦慮其未極也此所謂得在於神靜失在於物虛若謂靜於其靜非曰窮靜魄於其魄不云盡魄吾所許也無所間然通源曰若卿謂老氏不盡乎無則非想期於得意若卿謂盡無而不盡有得意復爽吾所斯周之問曰盡有盡無非極莫備知無知有吾許其道家唯非有非無之一地道言不及耳非有非無三宗所蘊倘贍餘慮惟足下其眄之念不使得意之相爽移失於有歸耳通源曰非鳧則乙蹟固然矣蹟固其然吾不復答又曰吾與老釋相識正如此正復是目擊道斯存又曰得意有本何至取教又曰誠哉有是言吾所以見道來一於佛周之問曰足下之所目擊道存得意有本想法性之真義是其此地乎佛教有之足下所取非所以何至取教也目擊之本即在教跡謂之鳧乙則其鴻安漸哉諸法真性老無其旨目擊高情無存老蹟旨蹟兩亡索宗無所論所謂無侮於道本當無侮於何地哉若謂探道家之跡見其來一於道者則是真諦實義沿文可見矣將沿於道章而得之乎為沿於德篇而遇之也若兩無所沿而玄德於方寸者此自足下懷抱與老釋而為三耳或可獨樹一家非老情之所敢逮也通源曰虞芮二國之鬭田非文王所知也斯自鹿巾之空負頭上環杖之自誣掌中吾安能了之哉周之問曰足下謂苦下之且藏即色則虛空有闕矣足下謂法性以即色圖空則法性為備矣今有人於此操環杖而言法性鹿巾之士執虛無而來誚曰爾不同我吾與爾闕足下從容倚棘聽斷於其間曰皆不可也謂其鹿巾空負於頭上環杖自誣於掌中以足下之精明特達而判訟若斯良虞芮之所以於邑也通源曰吾不翔翮於四果卿尚無疑其集佛吾翮不翔於五通而於集道復何晦周之問曰足下不翔翮於四果猶勤集於佛教翮不翔於五通何獨棄於道跡乎理例不通方為彼訴通源曰當欲列儒圍道故先屬垣隙周之問曰足下通源唯道源不及儒吾因疑其闕是以相訪但未知融然自道唯道能融將道之融然修儒可會邪雖非義本縱言宜及想釋本多暇幸惠餘音並同上
